                                    </select>
                                    <button
                                        disabled={carregandoAcessos}
                                        className={`w-full py-4 rounded-xl font-black text-white uppercase text-xs tracking-[0.2em] transition-all active:scale-95 shadow-lg ${modoEdicaoAcesso ? 'bg-blue-600' : 'bg-red-600 hover:bg-red-700'}`}
                                    >
                                        {carregandoAcessos
                                            ? 'Processando...'
                                            : modoEdicaoAcesso
                                                ? 'Atualizar Dados'
                                                : 'Inserir Usuário'}
                                    </button>
                                    {modoEdicaoAcesso && (
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setModoEdicaoAcesso(false);
                                                setFormAcesso({
                                                    login: '',
                                                    senha: '',
                                                    nivel: 'Visual'
                                                });
                                            }}
                                            className="w-full text-[9px] font-black text-gray-400 uppercase hover:text-red-500 transition-colors"
                                        >
                                            Cancelar Alterações
                                        </button>
                                    )}
                                </form>
                            </div>
                        </div>
                        {/* TABELA */}
                        <div className="lg:col-span-8">
                            <div className="bg-white rounded-2xl shadow-xl border overflow-hidden">
                                <div className="p-5 bg-zinc-50 border-b flex flex-wrap items-center gap-4">
                                    <div className="relative flex-1 min-w-[200px]">
                                        <Icon
                                            name="search"
                                            className="absolute left-4 top-3.5 text-gray-400"
                                            size={14}
                                        />
                                        <input
                                            type="text"
                                            placeholder="Filtrar usuários..."
                                            value={filtroUsuario}
                                            onChange={(e) => setFiltroUsuario(e.target.value)}
                                            className="w-full pl-12 pr-4 py-3.5 border rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-red-500/20 transition-all"
                                        />
                                    </div>
                                    <div className="px-4 py-2 bg-zinc-200 rounded-lg text-[9px] font-black text-zinc-600 uppercase tracking-tighter">
                                        {(usuariosSistema || []).length} utilizadores
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-zinc-900 text-zinc-400 text-[9px] font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="px-6 py-4">Login</th>
                                                <th className="px-6 py-4">Senha</th>
                                                <th className="px-6 py-4">Nível</th>
                                                <th className="px-6 py-4 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {(usuariosSistema || [])
                                                .filter(u =>
                                                    String(u.login || '')
                                                        .toLowerCase()
                                                        .includes(filtroUsuario.toLowerCase())
                                                )
                                                .map((u, idx) => (
                                                    <tr
                                                        key={idx}
                                                        className="hover:bg-red-50/20 transition-colors"
                                                    >
                                                        <td className="px-6 py-3 font-black text-xs text-zinc-800">
                                                            {u.login}
                                                        </td>
                                                        <td className="px-6 py-3 text-[11px] font-bold text-zinc-500">
                                                            {u.senha}
                                                        </td>
                                                        <td className="px-6 py-3">
                                                            <span className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${u.nivel === 'Admin'
                                                                ? 'bg-red-100 text-red-700'
                                                                : u.nivel === 'User'
                                                                    ? 'bg-green-100 text-green-700'
                                                                    : 'bg-blue-100 text-blue-700'
                                                                }`}>
                                                                {u.nivel}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-3 text-right space-x-1">
                                                            <button
                                                                onClick={() => {
                                                                    setFormAcesso({
                                                                        login: u.login,
                                                                        senha: u.senha,
                                                                        nivel: u.nivel
                                                                    });
                                                                    setModoEdicaoAcesso(true);
                                                                    window.scrollTo({
                                                                        top: 0,
                                                                        behavior: 'smooth'
                                                                    });
                                                                }}
                                                                className="p-2.5 text-blue-600 hover:bg-blue-100 rounded-xl transition-all"
                                                            >
                                                                <Icon name="edit-3" size={15} />
                                                            </button>
                                                            <button
                                                                onClick={async () => {
                                                                    if (
                                                                        String(u.login).trim().toUpperCase() ===
                                                                        String(currentUser).trim().toUpperCase()
                                                                    ) {
                                                                        alert("Você não pode deletar o próprio usuário.");
                                                                        return;
                                                                    }
                                                                    const confirmar = confirm(
                                                                        `Deseja remover o usuário ${u.login}?`
                                                                    );
                                                                    if (!confirmar) return;
                                                                    try {
                                                                        const res = await jsonpRequest(
                                                                            `${SCRIPT_URL}?action=delete_user&userTarget=${encodeURIComponent(u.login)}`
                                                                        );
                                                                        if (res.success) {
                                                                            alert("Usuário removido com sucesso.");
                                                                            carregarUsuariosSistema();
                                                                        } else {
                                                                            alert(res.error || "Erro ao deletar");
                                                                        }
                                                                    } catch (err) {
                                                                        alert("Erro de comunicação");
                                                                    }
                                                                }}
                                                                className="p-2.5 text-red-600 hover:bg-red-100 rounded-xl transition-all"
                                                            >
                                                                <Icon name="trash-2" size={15} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen bg-gray-100 flex flex-col">
                    {/* HEADER */}
                    <header className="bg-zinc-900 text-white p-4 flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-4">
                            <img
                                src={LOGO_URL}
                                className="h-12 bg-white p-1 rounded shadow-sm"
                            />
                            <div className="flex flex-col leading-tight">
                                <span className="text-xl font-black italic tracking-tighter">
                                    DON BRUNO
                                </span>
                                <span className="text-[9px] text-red-500 font-bold uppercase tracking-[0.4em]">
                                    Painel Operacional
                                </span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button
                                onClick={() => setView('menu')}
                                className="flex items-center gap-2 font-black uppercase text-[10px] bg-zinc-800 px-4 py-2 rounded-lg hover:bg-zinc-700 border border-zinc-700">
                                <Icon name="arrow-left" size={14} />
                                Menu
                            </button>
                            <button
                                onClick={carregarDashboard}
                                className="p-2.5 bg-red-600 rounded-full hover:bg-red-700 shadow-lg">
                                <Icon
                                    name="refresh-cw"
                                    size={16}
                                />
                            </button>
                        </div>
                    </header>
                    <main className="w-full max-w-full p-6 space-y-6">
                        <div className=" bg-white rounded-2xl shadow-lg p-4 space-y-4">
                            <div className="flex items-center gap-2">
                                <Icon name="filter" size={18} className="text-red-600" />
                                <span className=" font-black uppercase text-xs text-zinc-700">
                                    Filtro do Painel
                                </span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {[
                                    ["Total", "all"],
                                    ["Hoje", "1"],
                                    ["7 Dias", "7"],
                                    ["30 Dias", "30"],
                                    ["Mês", "mes"],
                                    ["Personalizado", "custom"]
                                ].map(([texto, valor]) => (
                                    <button
                                        key={valor}
                                        onClick={() => {
                                            setPeriodoDashboard(valor);
                                            if (valor === "all") {
                                                setDataInicio("");
                                                setDataFim("");
                                            }
                                        }}
                                        className={`px-4 py-2 rounded-xl font-black uppercase text-[10px] transition-all ${periodoDashboard === valor ? 'bg-red-600 text-white' : 'bg-zinc-100 text-zinc-500 hover:bg-zinc-200'}`}>
                                        {texto}
                                    </button>
                                ))}
                            </div>
                            {periodoDashboard === "custom" && (
                                <div className="flex gap-3 flex-wrap">
                                    <input
                                        type="date"
                                        value={dataInicio}
                                        onChange={(e) =>
                                            setDataInicio(
                                                e.target.value
                                            )
                                        }
                                        className=" border rounded-xl  p-2  text-xs font-bold" />
                                    <input type="date" value={dataFim} onChange={(e) => setDataFim(e.target.value)}
                                        className=" border rounded-xl p-2 text-xs font-bold" />
                                </div>
                            )}
                            <div className="text-[10px] font-bold text-zinc-400 uppercase">
                                Dados exibidos conforme período selecionado
                            </div>
                        </div>
                        {/* KPI CARDS */}
                        <div className="grid grid-cols-3 md:grid-cols-5 xl:grid-cols-5 gap-4">
                            {[
                                ["Recebido", formatPeso(dashboardData?.recebido), "blue"],
                                ["Processado", formatPeso(dashboardData?.processado), "indigo", `Rend. ${dashboardData?.rendSelecao || 0}%`],
                                ["Disponível Envase", formatPeso(dashboardData?.disponivel), "amber"],
                                ["Envasado", formatPeso(dashboardData?.produzido), "green", `Rend. ${dashboardData?.rendEnvase || 0}%`],
                                ["Descarte", formatPeso(dashboardData?.descarte), "orange"],
                                ["Lotes", dashboardData?.lotes || 0, "red"],
                                ["Frutas", dashboardData?.frutas || 0, "purple"],
                                ["Sabores", dashboardData?.sabores || 0, "pink"],
                                ["Fornecedores", dashboardData?.fornecedores || 0, "cyan"]
                            ].map((item, index) => (
                                <div
                                    key={index} className={` bg-white rounded-2xl shadow-xl p-5 border-t-4 border-${item[2]}-600 flex flex-col min-h-[120px]`}>
                                    <div className="text-zinc-500 text-[10px] sm:text-xs uppercase font-black tracking-normal text-left w-full mb-3">
                                        {item[0]}
                                    </div>
                                    <div className="flex-1 flex flex-col items-center justify-center">
                                        <div className="text-sm sm:text-base md:text-xl lg:text-2xl font-black text-zinc-800 leading-tight text-center break-words px-1">
                                            {item[1]}
                                        </div>
                                        {item[3] && (
                                            <div className="mt-2 text-[12px] font-black uppercase text-zinc-500 text-center block w-full">
                                                {item[3]}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                        {/* ÁREA DOS GRÁFICOS */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full max-w-full items-stretch">
                            {/* PRODUÇÃO DIÁRIA */}
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden w-full min-w-0">
                                {/* CABEÇALHO */}
                                <div className="px-4 py-3 bg-zinc-900 text-white flex items-center justify-between">
                                    <span className="font-black uppercase text-xs">
                                        Produção diária
                                    </span>
                                    {/* LEGENDA */}
                                    <div className="flex items-center gap-4 text-[10px]">
                                        <div className="flex items-center gap-1">
                                            <div className="w-3 h-3 rounded-sm bg-emerald-500"></div>
                                            <span>Processado</span>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            <div className="w-3 h-3 rounded-sm bg-orange-400"></div>
                                            <span>Envasado</span>
                                        </div>
                                    </div>
                                </div>
                                {/* GRÁFICO */}
                                <div className="h-72 p-4">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart
                                            data={dashboardData?.graficoProducao || []}
                                            margin={{
                                                top: 30,
                                                right: 20,
                                                left: 0,
                                                bottom: 5
                                            }}
                                        >
                                            <CartesianGrid
                                                strokeDasharray="3 3"
                                                vertical={false}
                                                stroke="#E5E7EB"
                                            />
                                            <XAxis
                                                dataKey="data"
                                                tickFormatter={(label) => {
                                                    if (!label) return "";
                                                    return String(label).slice(0, 5);
                                                }}
                                                tick={{
                                                    fontSize: 11,
                                                    fill: "#52525B"
                                                }}
                                                axisLine={false}
                                                tickLine={false}
                                            />
                                            <Tooltip
                                                formatter={(value, name) => [
                                                    `${Number(value).toFixed(1).replace(".", ",")} kg`,
                                                    name
                                                ]}
                                            />
                                            <Bar
                                                dataKey="processado"
                                                name="Processado"
                                                fill="#22c55e"
                                                radius={[6, 6, 0, 0]}
                                            >
                                                <LabelList
                                                    dataKey="processado"
                                                    position="top"
                                                    formatter={(value) =>
                                                        `${Number(value).toFixed(1).replace(".", ",")} kg`
                                                    }
                                                    style={{
                                                        fontSize: 9,
                                                        fill: "#374151",
                                                        fontWeight: 700
                                                    }}
                                                />
                                            </Bar>
                                            <Bar
                                                dataKey="envasado"
                                                name="Envasado"
                                                fill="#f97316"
                                                radius={[6, 6, 0, 0]}
                                            >
                                                <LabelList
                                                    dataKey="envasado"
                                                    position="top"
                                                    formatter={(value) =>
                                                        `${Number(value).toFixed(1).replace(".", ",")} kg`
                                                    }
                                                    style={{
                                                        fontSize: 9,
                                                        fill: "#374151",
                                                        fontWeight: 700
                                                    }}
                                                />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            {/* RENDIMENTO POR FRUTA */}
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden w-full min-w-0">
                                {/* HEADER */}
                                <div className="px-4 py-3 bg-zinc-900 text-white flex items-center justify-between">
                                    <span className="font-black uppercase text-xs">
                                        Rendimento por fruta
                                    </span>
                                </div>
                                {/* CONTEÚDO */}
                                <div className="h-72 p-4 overflow-y-auto">
                                    {/* GRID 4 COLUNAS */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 xl:grid-cols-3 gap-1">
                                        {(dashboardData?.graficoRendimentoFruta || [])
                                            .sort((a, b) => b.corte - a.corte)
                                            .map((item, index) => (
                                                <div key={index} className="bg-zinc-50 rounded-xl p-2 border border-zinc-100 hover:bg-zinc-100 transition" >
                                                    {/* RANK + FRUTA */}
                                                    <div className="flex items-center gap-1 font-black text-sm text-zinc-700">
                                                        <span className="text-xs text-zinc-400 w-6">
                                                            #{index + 1}
                                                        </span>
                                                        <span className="text-lg">
                                                            {getFrutaIcone(item.fruta)}
                                                        </span>
                                                        <span className="truncate">
                                                            {item.fruta}
                                                        </span>
                                                    </div>
                                                    {/* INDICADORES */}
                                                    <div className="text-xs font-black flex gap-x-2 mt-0">
                                                        <div className="text-emerald-600">
                                                            Corte {item.corte}%
                                                        </div>
                                                        <div className="text-orange-500">
                                                            Envase {item.envase}%
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                    </div>
                                </div>
                            </div>
                        </div>



                        {/* RASTREABILIDADE */}
                        <div className=" bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div className=" p-4 bg-zinc-900 text-white font-black uppercase text-xs">
                                Rastreabilidade Operacional
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className=" bg-zinc-50 text-[10px] uppercase text-zinc-500">
                                        <tr>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("data")} >
                                                Data {sortConfig.key === "data" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("lote")}>
                                                Lote {sortConfig.key === "lote" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("fruta")}>
                                                Fruta {sortConfig.key === "fruta" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("recebimentoStatus")}>
                                                Recebimento {sortConfig.key === "recebimentoStatus" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("selecaoStatus")}>
                                                Sel. Corte {sortConfig.key === "selecaoStatus" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                            <th
                                                className="p-4 text-left cursor-pointer"
                                                onClick={() => handleSort1("envaseStatus")}>
                                                Envase {sortConfig.key === "envaseStatus" ? (sortConfig.direction === "asc" ? "▲" : "▼") : ""}
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(dashboardData?.rastreabilidade || []).length === 0 ? (
                                            <tr>
                                                <td colSpan="6" className="p-8 text-center text-gray-300 font-bold">
                                                    Sem dados
                                                </td>
                                            </tr>
                                        ) : (
                                            sortedRastreabilidade.map((item, index) => (
                                                <tr key={index} className="border-t text-xs">
                                                    {/* DATA */}
                                                    <td className="p-3 text-zinc-500">
                                                        {formatDateBR(item.data)}
                                                    </td>
                                                    {/* LOTE */}
                                                    <td className="p-3 font-black text-zinc-700">
                                                        {item.lote}
                                                    </td>
                                                    {/* FRUTA */}
                                                    <td className="p-3 font-bold text-zinc-700">
                                                        {item.fruta}
                                                    </td>
                                                    {/* RECEBIMENTO */}
                                                    <td className="p-3">
                                                        <span className={`px-2 py-1 rounded text-[10px] font-black
                                                               ${normalizeStatus(item.recebimentoStatus) === "TOTAL"
                                                                ? "bg-emerald-100 text-emerald-700"
                                                                : "bg-amber-100 text-amber-700"
                                                            }`}>
                                                            {normalizeStatus(item.recebimentoStatus)}
                                                        </span>
                                                    </td>
                                                    {/* SELEÇÃO */}
                                                    <td className="p-3">
                                                        <span className={`px-2 py-1 rounded text-[10px] font-black
                                                                ${normalizeStatus(item.selecaoStatus) === "TOTAL"
                                                                ? "bg-emerald-100 text-emerald-700"
                                                                : normalizeStatus(item.selecaoStatus) === "PARCIAL"
                                                                    ? "bg-amber-100 text-amber-700"
                                                                    : "bg-zinc-100 text-zinc-500"
                                                            }`}>
                                                            {normalizeStatus(item.selecaoStatus)}
                                                        </span>
                                                    </td>
                                                    {/* ENVASE */}
                                                    <td className="p-3">
                                                        <span className={`px-2 py-1 rounded text-[10px] font-black
                                                                  ${normalizeStatus(item.envaseStatus) === "TOTAL"
                                                                ? "bg-emerald-100 text-emerald-700"
                                                                : normalizeStatus(item.envaseStatus) === "PARCIAL"
                                                                    ? "bg-amber-100 text-amber-700"
                                                                    : "bg-zinc-100 text-zinc-500"
                                                            }`}>
                                                            {normalizeStatus(item.envaseStatus)}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );

            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
